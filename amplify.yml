version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - npx prisma generate
        - echo "DATABASE_URL set:$([ -n "$DATABASE_URL" ] && echo yes || echo NO)"
        - echo "AUTH_SECRET set:$([ -n "$AUTH_SECRET" ] && echo yes || echo NO)"
    build:
      commands:
        - export NODE_ENV=production
        - npx prisma migrate deploy
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
